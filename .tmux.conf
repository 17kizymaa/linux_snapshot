# tmux configuration for remote development over Tailscale

# 256-color terminal support
set -g default-terminal "screen-256color"

# Mouse support for pane switching and resizing
set -g mouse on

# Increase scrollback buffer for long-running sessions
set -g history-limit 50000

# Status bar: show session name, window index, and time
set -g status-left "[#S] "
set -g status-right "%Y-%m-%d %H:%M"

# Start window and pane numbering at 1 (easier to reach)
set -g base-index 1
setw -g pane-base-index 1

# Faster key repetition
set -s escape-time 0

# Aggressive resize: fit to smallest client attached to session
setw -g aggressive-resize on

# Renumber windows when one is closed
set -g renumber-windows on

# Keep tmux alive even when no clients are attached
set -g detach-on-destroy off
